# DigitalEmployeeMemo docker-compose configuration
version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: dem_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: digital_employee_memo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dem_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: dem_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dem_network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dem_api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/digital_employee_memo
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/digital_employee_memo
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_BACKEND_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dem_network

  # Alembic (for migrations - run manually)
  # docker-compose run --rm alembic upgrade head
  alembic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dem_alembic
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/digital_employee_memo
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/digital_employee_memo
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dem_network

volumes:
  postgres_data:
  redis_data:

networks:
  dem_network:
    driver: bridge
